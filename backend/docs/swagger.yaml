securityDefinitions:
  JWTAccess:
    description: Access JWT-token. Cookie will automatic add after auth is done.
    in: cookie
    name: access
    type: apiKey
  JWTRefresh:
    description: Refresh JWT-token. Cookie will automatic add after auth is done.
    in: cookie
    name: refresh
    type: apiKey
