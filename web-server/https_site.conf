upstream back {
    server backend:8000;
}


server {
    # внешний входящий порт
    listen 443 ssl;
    http2 on;
    # имя этого сервера
    server_name platform-skadi.ru;

    ssl_certificate     /etc/letsencrypt/live/platform-skadi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform-skadi.ru/privkey.pem;

    # перенаправление на API бэка на Go
    location /api/ {
        proxy_pass http://back;
    }

    # запрос фронтом статических картинок
	location /public {
        expires 30d;
		root /app/frontend/;
		try_files $uri $uri/ =404;
    }

    # ренденринг сбилдинного фронтенда
    location / {
		root /app/frontend/dist/;
		index index.html;
		try_files $uri $uri/ /index.html;
    }
}
