server {
    listen 443 ssl;
    http2 on;
    server_name platform-skadi.ru;

    # SSL-cert and TLS-protocol
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_certificate     /etc/letsencrypt/live/platform-skadi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform-skadi.ru/privkey.pem;

    # timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # DDOS-guard
    limit_req zone=ddos burst=5 nodelay;

    # доп. правила для загрузки файлов
    location ~ ^/api/v1/(task|solutions)/ {
        client_max_body_size 100M;

        client_body_timeout 300s;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        proxy_request_buffering off;
        proxy_buffering off;
    }

    # перенаправление на API бэка на Go
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # запрос фронтом статических картинок
	location /public {
        expires 30d;
		root /app/frontend/;
		try_files $uri $uri/ =404;
    }

    # ренденринг сбилдинного фронтенда
    location / {
		root /app/frontend/dist/;
		index index.html;
		try_files $uri $uri/ /index.html;
    }
}
